{% extends 'base.html' %}
{% block title %}Alerts{% endblock %}
{% block header %}INCIDENT TELEMETRY{% endblock %}

{% block content %}
<div style="display:flex;flex-direction:column;gap:24px;">

    <!-- Pill Tabs -->
    <div style="display:flex;gap:12px;margin-bottom:8px;">
        <button id="btn-warnings" class="tab-btn" style="background:rgba(88,166,255,0.12); border:1px solid rgba(88,166,255,0.3); color:#58A6FF; font-family:'Space Grotesk'; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; padding:10px 24px; border-radius:30px; cursor:pointer;" onclick="switchTab('warnings', this)">Warnings</button>
        <button id="btn-emergency" class="tab-btn" style="background:#161B22; border:1px solid #30363D; color:#8B949E; font-family:'Space Grotesk'; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; padding:10px 24px; border-radius:30px; cursor:pointer;" onclick="switchTab('emergency', this)">Emergency</button>
        <button id="btn-notifications" class="tab-btn" style="background:#161B22; border:1px solid #30363D; color:#8B949E; font-family:'Space Grotesk'; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; padding:10px 24px; border-radius:30px; cursor:pointer;" onclick="switchTab('notifications', this)">Notifications</button>
    </div>

    <!-- Dynamic Alerts Container -->
    <div id="alerts-container" style="display:flex;flex-direction:column;gap:16px;"></div>

</div>

<script>
let currentTab = 'warnings';

function switchTab(id, btn) {
    currentTab = id;
    document.querySelectorAll('.tab-btn').forEach(el => {
        el.style.background = '#161B22';
        el.style.border = '1px solid #30363D';
        el.style.color = '#8B949E';
    });
    
    btn.style.background = 'rgba(88,166,255,0.12)';
    btn.style.border = '1px solid rgba(88,166,255,0.3)';
    btn.style.color = '#58A6FF';
    
    renderAlerts(id);
}

// Simulate live alert feed
const alertFeed = [
  { type: 'emergency', title: 'Medical Incident at North Stand', time: '08:02 UTC', detail: 'EMS dispatched. Isolate via mobile barriers.' },
  { type: 'warnings',  title: 'Main Concourse Volume Warning',   time: '08:14 UTC', detail: 'Shift traffic to external ring exits.' },
  { type: 'notifications', title: 'Inventory Push at Combo Corner',  time: '07:44 UTC', detail: '20% discount transmitted to active devices.' },
];

let alertIndex = 0;
function injectLiveAlert() {
  const newAlert = {
    type: 'warnings',
    title: `Auto-Alert #${++alertIndex}: Sector ${String.fromCharCode(64 + alertIndex)} density spike`,
    time: new Date().toISOString().split('T')[1].split('.')[0] + ' UTC',
    detail: 'Automated telemetry threshold breach detected. Review recommended.'
  };
  alertFeed.unshift(newAlert);
  renderAlerts(currentTab);
}

function renderAlerts(tabType) {
    const container = document.getElementById('alerts-container');
    container.innerHTML = '';
    
    const filtered = alertFeed.filter(a => a.type === tabType);
    if(filtered.length === 0) {
        container.innerHTML = '<p style="color:#8B949E; font-family:\'Space Grotesk\';">No active alerts.</p>';
        return;
    }
    
    filtered.forEach(alert => {
        let color = '#58A6FF'; // Blue for notifications
        if(alert.type === 'warnings') color = '#E3B341'; // Amber for warnings
        if(alert.type === 'emergency') color = '#F85149'; // Red for emergency
        
        container.innerHTML += `
        <div class="cf-card clickable" style="box-shadow:inset 3px 0 0 ${color}; background:linear-gradient(90deg, ${color}15 0%, transparent 35%); padding:24px;"
             onclick="openModal('${alert.title.toUpperCase()}', '${alert.detail}')">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
                <h3 style="font-family:'Space Grotesk';font-weight:600;font-size:16px;color:#E6EDF3;">${alert.title}</h3>
                <span style="font-family:'JetBrains Mono';font-size:11px;color:#8B949E;">${alert.time}</span>
            </div>
            <p style="font-family:'Space Grotesk';font-size:13px;color:#8B949E;line-height:1.6;">${alert.detail}</p>
        </div>`;
    });
}

document.addEventListener('DOMContentLoaded', () => {
    switchTab('warnings', document.getElementById('btn-warnings'));
});

// Inject a new alert every 30s to simulate live feed
setInterval(injectLiveAlert, 30000);
</script>
{% endblock %}
