{% extends 'base.html' %}
{% block title %}AI Assistant{% endblock %}
{% block header %}AI OPERATIONS ASSISTANT{% endblock %}

{% block content %}
<div style="display:flex;flex-direction:column;height:calc(100vh - 200px);">

    <!-- Header Status -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px;">
        <div style="width:8px;height:8px;border-radius:50%;background:#3FB950;animation:pulse 2s infinite;"></div>
        <span style="font-family:'JetBrains Mono';font-size:12px;color:#3FB950;font-weight:700;text-transform:uppercase;">CONNECTED</span>
    </div>

    <!-- Chat container -->
    <div class="cf-card" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
        
        <!-- Messages Area -->
        <div id="chat-window" style="flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:20px;">
            <div style="align-self:flex-start; max-width:80%; background:#161B22; border:1px solid #30363D; border-radius:10px 10px 10px 2px; padding:16px;">
                <p style="font-family:'Space Grotesk'; font-size:14px; color:#E6EDF3; line-height:1.6;">Secure channel initialized. I am monitoring live node density and throughput metrics. How can I assist?</p>
            </div>
        </div>

        <!-- Suggestion Chips -->
        <div style="padding:0 24px 16px; display:flex; gap:12px; overflow-x:auto;">
            <button onclick="sendMsg('What is the current wait time at Gate E?')" class="btn-outline" style="border-radius:30px; font-size:10px; padding:8px 16px;">CHECK GATE E</button>
            <button onclick="sendMsg('Which food stall should we promote?')" class="btn-outline" style="border-radius:30px; font-size:10px; padding:8px 16px;">F&B PROMOTION</button>
            <button onclick="sendMsg('Advise on North Stand density.')" class="btn-outline" style="border-radius:30px; font-size:10px; padding:8px 16px;">ANALYZE N.STAND</button>
        </div>

        <!-- Input Area -->
        <div style="padding:0 24px 24px; display:flex; gap:16px;">
            <input id="chat-input" type="text" placeholder="Query ops telemetrics..." onkeypress="if(event.key === 'Enter') sendMsg()" style="flex:1;">
            <button class="btn-primary" onclick="sendMsg()">
                TRANSMIT
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </button>
        </div>

    </div>

</div>

<script>
    let chatHistory = [];
    const chatWindow = document.getElementById('chat-window');
    const input = document.getElementById('chat-input');

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = 'chat-msg';
        div.style.maxWidth = '80%';
        div.style.padding = '16px';
        
        if(role === 'user') {
            div.style.alignSelf = 'flex-end';
            div.style.background = 'rgba(88,166,255,0.12)';
            div.style.border = '1px solid rgba(88,166,255,0.2)';
            div.style.borderRadius = '10px 10px 2px 10px';
            div.innerHTML = `<p style="font-family:'Space Grotesk'; font-size:14px; color:#E6EDF3; line-height:1.6;">${text}</p>`;
        } else {
            div.style.alignSelf = 'flex-start';
            div.style.background = '#161B22';
            div.style.border = '1px solid #30363D';
            div.style.borderRadius = '10px 10px 10px 2px';
            div.innerHTML = `<p style="font-family:'Space Grotesk'; font-size:14px; color:#E6EDF3; line-height:1.6;">${text}</p>`;
        }
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function sendMsg(overrideText = null) {
        const text = overrideText || input.value.trim();
        if(!text) return;
        
        if(!overrideText) input.value = '';
        
        appendMessage('user', text);
        chatHistory.push({ role: 'user', content: text });
        
        const loader = document.createElement('div');
        loader.className = 'chat-msg flex justify-start';
        loader.style.alignSelf = 'flex-start';
        loader.innerHTML = `
        <div style="background:#161B22;border:1px solid #30363D;border-radius:10px 10px 10px 2px;padding:14px 18px;display:flex;gap:5px;align-items:center;">
          <span style="width:7px;height:7px;border-radius:50%;background:#484F58;animation:typingDot 1.2s infinite;" ></span>
          <span style="width:7px;height:7px;border-radius:50%;background:#484F58;animation:typingDot 1.2s infinite 0.2s;"></span>
          <span style="width:7px;height:7px;border-radius:50%;background:#484F58;animation:typingDot 1.2s infinite 0.4s;"></span>
        </div>`;
        chatWindow.appendChild(loader);
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: chatHistory })
            });
            const data = await res.json();
            
            chatWindow.removeChild(loader);
            chatHistory.push({ role: 'assistant', content: data.reply });
            appendMessage('assistant', data.reply);
        } catch(e) {
            chatWindow.removeChild(loader);
            appendMessage('assistant', "Network Error: Could not connect to API.");
        }
    }
</script>
{% endblock %}
